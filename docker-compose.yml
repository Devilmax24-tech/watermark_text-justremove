version: '3.8'

services:
  app:
    build: .
    container_name: justremove-app
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=
    volumes:
      - ./app:/app/app
      - ./static:/app/static
    restart: unless-stopped
    networks:
      - justremove-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: justremove-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./static:/usr/share/nginx/html/static:ro
    restart: unless-stopped
    networks:
      - justremove-network
    depends_on:
      - app

networks:
  justremove-network:
    driver: bridge
